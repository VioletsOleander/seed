[colors.primary]
background = "#fafafa"
foreground = '#2a2c33'

[colors.normal]
black = '#2a2c33'
red = '#be342c'
green = '#327a2e'
yellow = '#73732b'
blue = '#2153e8'
magenta = '#950095'
cyan = '#2e7a78'
white = '#bbbbbb'

[colors.bright]
black = '#383a42'
red = '#dd352c'
green = '#378532'
yellow = '#82743a'
blue = '#426c3b'
magenta = '#a00095'
cyan = '#397f7c'
white = '#ffffff'

[colors.cursor]
text = "#ffffff"
cursor = "#4b73ec"

[colors.selection]
text = "CellForeground"
background = "#ededed"

[cursor]
style = { shape = "Beam", blinking = "Never" }

[terminal]
shell = { program = "nu", args = ["--login"] }

[font]
normal = { family = "FiraCode Nerd Font", style = "Retina" }
size = 11.5

[selection]
save_to_clipboard = true

[window]
dynamic_padding = true
dimensions = { columns = 80, lines = 24 }
position = { x = 760, y = 390 }           # start in middle screen
level = "AlwaysOnTop"
